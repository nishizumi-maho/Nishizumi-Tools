name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate Python syntax
        run: |
          python -m py_compile apps/Nishizumi_FuelMonitor.py
          python -m py_compile apps/Nishizumi_Pittime.py
          python -m py_compile apps/Nishizumi_TireWear.py
          python -m py_compile apps/Nishizumi_Traction.py
