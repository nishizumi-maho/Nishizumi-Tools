name: Build EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller irsdk

      - name: Rename scripts to valid module names
        shell: pwsh
        run: |
          Copy-Item 'pit_stop_overlay (4).py'         'pit_stop_overlay.py'
          Copy-Item 'traction_circle_overlay (2).py'  'traction_circle_overlay.py'

      - name: Build pit_stop_overlay.exe
        run: >
          pyinstaller
          --onefile
          --noconsole
          --name pit_stop_overlay
          pit_stop_overlay.py

      - name: Build traction_circle_overlay.exe
        run: >
          pyinstaller
          --onefile
          --noconsole
          --name traction_circle_overlay
          traction_circle_overlay.py

      - name: Upload pit_stop_overlay.exe
        uses: actions/upload-artifact@v4
        with:
          name: pit_stop_overlay
          path: dist/pit_stop_overlay.exe
          retention-days: 30

      - name: Upload traction_circle_overlay.exe
        uses: actions/upload-artifact@v4
        with:
          name: traction_circle_overlay
          path: dist/traction_circle_overlay.exe
          retention-days: 30
